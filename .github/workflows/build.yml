name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          echo "Xcode: $(xcodebuild -version | tr '\n' ' ')"
          echo "Swift: $(swift --version | head -1)"

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"        # skip the brew update that trips on untrusted taps
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen || brew install xcodegen  # one retry for transient bottle hiccups
          xcodegen --version

      - name: Generate project
        working-directory: Noeron
        run: xcodegen generate

      - name: Build macOS
        working-directory: Noeron
        run: |
          set -o pipefail
          xcodebuild \
            -project Noeron.xcodeproj \
            -scheme Noeron_macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Build iOS (Simulator)
        working-directory: Noeron
        run: |
          set -o pipefail
          xcodebuild \
            -project Noeron.xcodeproj \
            -scheme Noeron_iOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Unit tests (macOS)
        working-directory: Noeron
        run: |
          set -o pipefail
          xcodebuild test \
            -project Noeron.xcodeproj \
            -scheme Noeron_macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
