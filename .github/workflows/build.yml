name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Build (macOS)
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      SIGNING: 'CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen (latest)
        run: brew install xcodegen || brew upgrade xcodegen

      # NOTE: the repository root *is* the Noeron project folder (project.yml lives
      # here), so these steps run at the checkout root — no working-directory.
      - name: Generate project
        run: |
          xcodegen --version
          xcodegen generate

      # Build the app *targets* directly (not the schemes, which also build the
      # test bundles — the iOS UI-test runner can demand signing on CI).
      - name: Build macOS
        run: |
          set -o pipefail
          xcodebuild -project Noeron.xcodeproj -target Noeron_macOS -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build-macos.log

      - name: Build iOS (Simulator)
        run: |
          set -o pipefail
          xcodebuild -project Noeron.xcodeproj -target Noeron_iOS -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build-ios.log

      - name: Unit tests (macOS)
        run: |
          set -o pipefail
          xcodebuild test -project Noeron.xcodeproj -scheme Noeron_macOS \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee test-macos.log

      # Capture the exact errors even when a step above fails.
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          if-no-files-found: ignore
